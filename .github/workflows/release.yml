name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release assets
        env:
          CGO_ENABLED: 0
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist

          for target in \
            "linux amd64" \
            "darwin amd64" \
            "darwin arm64" \
            "windows amd64"
          do
            set -- $target
            goos="$1"
            goarch="$2"

            binary_name="floppr"
            if [ "$goos" = "windows" ]; then
              binary_name="floppr.exe"
            fi

            out_dir="dist/floppr_${TAG}_${goos}_${goarch}"
            mkdir -p "$out_dir"

            GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags="-s -w" -o "$out_dir/$binary_name" ./cmd/floppr

            if [ "$goos" = "windows" ]; then
              (
                cd "$out_dir"
                zip -q "../floppr_${TAG}_${goos}_${goarch}.zip" "$binary_name"
              )
            else
              tar -C "$out_dir" -czf "dist/floppr_${TAG}_${goos}_${goarch}.tar.gz" "$binary_name"
            fi

            rm -rf "$out_dir"
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
          fail_on_unmatched_files: true
