name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: floppr-linux-amd64
            binary_name: floppr
          - goos: windows
            goarch: amd64
            artifact_name: floppr-windows-amd64
            binary_name: floppr.exe
          - goos: darwin
            goarch: amd64
            artifact_name: floppr-darwin-amd64
            binary_name: floppr
          - goos: darwin
            goarch: arm64
            artifact_name: floppr-darwin-arm64
            binary_name: floppr

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test ./...

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }} ./cmd/floppr

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
